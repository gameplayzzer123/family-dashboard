<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Family Command Center - Aotea</title>
    <style>
        :root { --bg: #050505; --card: #121212; --text: #e0e0e0; --accent: #00d4ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #left { width: 45%; background: #000; position: relative; border-right: 1px solid #222; }
        #left img { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 1.5s; opacity: 1; }

        #right { width: 55%; padding: 25px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; }
        #clock { font-size: 75px; font-weight: bold; margin: 0; line-height: 1; }
        #date { color: var(--accent); font-size: 22px; margin-top: 5px; }
        .dots { cursor: pointer; font-size: 30px; color: #444; }

        .box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        
        #weather-info { display: flex; align-items: center; gap: 20px; }
        .temp { font-size: 42px; font-weight: bold; color: var(--accent); }
        .desc { font-size: 20px; color: #888; }

        #todo-input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 65%; }
        .add-btn { background: var(--accent); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; margin-top: 15px; max-height: 120px; overflow-y: auto; }
        li { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .del-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; }

        #cal-box { flex-grow: 1; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 10px; filter: invert(90%) hue-rotate(180deg) brightness(1.1); }
    </style>
</head>
<body>

<div id="left">
    <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=1000" id="slideshow">
</div>

<div id="right">
    <div class="header">
        <div>
            <div id="clock">00:00</div>
            <div id="date">Loading...</div>
        </div>
        <div class="dots" onclick="toggleMenu()">⋮</div>
    </div>

    <div class="box">
        <div id="weather-info">
            <span id="w-icon" style="font-size: 40px;">🌤️</span>
            <div>
                <div class="temp" id="weather-temp">--°C</div>
                <div class="desc">Aotea, Wellington</div>
            </div>
        </div>
    </div>

    <div class="box">
        <h3 style="margin: 0 0 15px 0; font-size: 18px;">Family Tasks</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="todo-input" placeholder="Enter a task...">
            <button class="add-btn" onclick="addTodo()">Add</button>
        </div>
        <ul id="todo-list"></ul>
    </div>

    <div class="box" id="cal-box">
        <iframe src="https://calendar.google.com/calendar/embed?mode=AGENDA&showTitle=0&showNav=0&showPrint=0&showTabs=0&showCalendars=0&src=en.usa%23holiday%40group.v.calendar.google.com"></iframe>
    </div>
</div>

<script>
    // 1. Precise Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('date').textContent = now.toLocaleDateString([], {weekday: 'long', month: 'long', day: 'numeric'});
    }
    setInterval(updateClock, 1000); updateClock();

    // 2. Weather Logic (Aotea/Wellington)
    async function getWeather() {
        try {
            const lat = -41.13; const lon = 174.85;
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await res.json();
            document.getElementById('weather-temp').textContent = Math.round(data.current_weather.temperature) + "°C";
            
            // Basic icon logic
            const code = data.current_weather.weathercode;
            document.getElementById('w-icon').textContent = (code < 3) ? "☀️" : (code < 50) ? "☁️" : "🌧️";
        } catch (e) { document.getElementById('weather-temp').textContent = "??°C"; }
    }
    getWeather(); setInterval(getWeather, 600000);

    // 3. To-Do List (Persistent)
    let chores = JSON.parse(localStorage.getItem('family_tasks')) || [];
    function renderTasks() {
        const list = document.getElementById('todo-list');
        list.innerHTML = chores.map((t, i) => `<li>${t} <span class="del-btn" onclick="removeTask(${i})">✕</span></li>`).join('');
        localStorage.setItem('family_tasks', JSON.stringify(chores));
    }
    function addTodo() {
        const input = document.getElementById('todo-input');
        if(input.value.trim()) { chores.push(input.value.trim()); input.value = ''; renderTasks(); }
    }
    function removeTask(i) { chores.splice(i, 1); renderTasks(); }
    renderTasks();

    // 4. Photo Slideshow with "Broken Link" Protection
    const photos = [
        "https://images.unsplash.com/photo-1511895426328-dc8714191300?w=1000",
        "https://images.unsplash.com/photo-1472289065668-ce650ac443d2?w=1000",
        "https://images.unsplash.com/photo-1502086223501-7ea244b05ffb?w=1000"
    ];
    let photoIdx = 0;
    const imgElement = document.getElementById('slideshow');

    function nextPhoto() {
        photoIdx = (photoIdx + 1) % photos.length;
        imgElement.style.opacity = 0;
        setTimeout(() => {
            imgElement.src = photos[photoIdx];
            imgElement.style.opacity = 1;
        }, 1500);
    }

    // This catches "broken" images and forces the code to move to the next one immediately
    imgElement.onerror = function() {
        console.log("Photo failed to load, skipping...");
        nextPhoto(); 
    };

    setInterval(nextPhoto, 30000);
</script>
</body>
</html>
