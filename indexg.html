<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Family Command Center - Aotea</title>
    <style>
        :root { --bg: #050505; --card: #121212; --text: #e0e0e0; --accent: #00d4ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LEFT SIDE: The Photos */
        #left { width: 45%; background: #000; position: relative; border-right: 1px solid #222; }
        #left img { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 1.5s; opacity: 1; }

        /* RIGHT SIDE: The Info */
        #right { width: 55%; padding: 25px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        #clock { font-size: 80px; font-weight: bold; margin: 0; line-height: 1; letter-spacing: -2px; }
        #date { color: var(--accent); font-size: 22px; margin-top: 5px; margin-bottom: 10px; }

        .box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        .temp { font-size: 42px; font-weight: bold; color: var(--accent); }
        
        #todo-input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 65%; outline: none; }
        .add-btn { background: var(--accent); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; color: black; }
        ul { list-style: none; padding: 0; margin-top: 15px; max-height: 140px; overflow-y: auto; }
        li { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #222; align-items: center; }

        #cal-box { flex-grow: 1; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 10px; filter: invert(90%) hue-rotate(180deg) brightness(1.1); }

        #fs-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-size: 11px; backdrop-filter: blur(5px); }
        #fs-btn:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

<div id="left">
    <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=1000" id="slideshow">
</div>

<div id="right">
    <div id="clock">00:00</div>
    <div id="date">Loading...</div>

    <div class="box">
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="w-icon" style="font-size: 40px;">🌤️</span>
            <div>
                <div class="temp" id="weather-temp">--°C</div>
                <div style="color:#888; font-size: 14px;">Aotea, Wellington</div>
            </div>
        </div>
    </div>

    <div class="box">
        <h3 style="margin:0 0 10px 0; font-size: 16px; color: #888;">Family Tasks</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="todo-input" placeholder="What needs doing?">
            <button class="add-btn" onclick="addTodo()">Add</button>
        </div>
        <ul id="todo-list"></ul>
    </div>

    <div class="box" id="cal-box">
        <iframe src="https://calendar.google.com/calendar/embed?mode=AGENDA&showTitle=0&showNav=0&showPrint=0&showTabs=0&showCalendars=0&src=en.usa%23holiday%40group.v.calendar.google.com"></iframe>
    </div>
</div>

<button id="fs-btn" onclick="toggleFS()">⛶ FULLSCREEN</button>

<script>
    // 1. PHOTO LOGIC
    // PASTE YOUR LONG GOOGLE IMAGE LINKS IN THE QUOTES BELOW
    const myPhotos = [
        "https://lh3.googleusercontent.com/pw/AP1GczOdTx4FyRG-cJPKAH_IEmsKTPfDDIAnnJoUbKNi57sqzC0WFDCVWwtKbilCGBkieBTNSp2ZcmLAMRNSKihTCB6oDqmkp9VCOhHD4PsF-EaNpdIZqq5_FH2HmfaM4KqGOY_yxIKoeKi_tt35o1Xa8HunUA=w796-h599-s-no-gm?authuser=0",
        "https://lh3.googleusercontent.com/pw/AP1GczPQlxg8_BA4ERbQGjtJsbs7VZOT8FU4XRSDguz2l7AFWHdhnNnZTyuCiPQI8J0quXtUoWpcq37a9ZcwXgjXww7muo33oZ3A_PBAP4NR8GhWCgDjcyQ4kbynGpmNh7kMuJgPEYi5etfe-VNVJowEVQtjCw=w449-h599-s-no-gm?authuser=0",
        "https://lh3.googleusercontent.com/pw/AP1GczPUwa3jkNbfpsUt6O89NlQpOn4XKcrfVi-aprjA-md8lIepdpZ6m7j9m_vzFu7Cbal-zyRlD_8dVdt4GLLfZMV705YIdZ5VXH-JOIe46ifwdv9SI9dZKSExDgpwTFI7wrIzcyJvDa8yh7IYzGkb9KVAow=w799-h599-s-no-gm?authuser=0"
    ];

    let pIdx = 0;
    const imgElement = document.getElementById('slideshow');
    
    // This stops Google from blocking the images!
    imgElement.setAttribute("referrerpolicy", "no-referrer");

    function rotatePhotos() {
        if (myPhotos.length === 0) return;
        pIdx = (pIdx + 1) % myPhotos.length;
        
        imgElement.style.opacity = 0; 
        setTimeout(() => {
            imgElement.src = myPhotos[pIdx];
            imgElement.style.opacity = 1;
        }, 1500);
    }
    
    // Skip to next if a photo link fails
    imgElement.onerror = () => rotatePhotos();
    setInterval(rotatePhotos, 25000);

    // 2. CLOCK
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('date').textContent = now.toLocaleDateString([], {weekday: 'long', month: 'long', day: 'numeric'});
    }
    setInterval(updateClock, 1000); updateClock();

    // 3. WEATHER (Aotea/Porirua)
    async function getWeather() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-41.13&longitude=174.85&current_weather=true`);
            const data = await res.json();
            document.getElementById('weather-temp').textContent = Math.round(data.current_weather.temperature) + "°C";
            const code = data.current_weather.weathercode;
            document.getElementById('w-icon').textContent = (code < 3) ? "☀️" : (code < 50) ? "☁️" : "🌧️";
        } catch (e) { document.getElementById('weather-temp').textContent = "??°C"; }
    }
    getWeather(); setInterval(getWeather, 600000);

    // 4. TASKS
    let chores = JSON.parse(localStorage.getItem('family_tasks')) || [];
    function renderTasks() {
        const list = document.getElementById('todo-list');
        list.innerHTML = chores.map((t, i) => `<li>${t} <span style="color:#ff4d4d;cursor:pointer;font-weight:bold" onclick="removeTask(${i})">✕</span></li>`).join('');
        localStorage.setItem('family_tasks', JSON.stringify(chores));
    }
    function addTodo() {
        const input = document.getElementById('todo-input');
        if(input.value.trim()) { chores.push(input.value.trim()); input.value = ''; renderTasks(); }
    }
    function removeTask(i) { chores.splice(i, 1); renderTasks(); }
    renderTasks();

    // 5. FULLSCREEN
    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            document.getElementById('fs-btn').textContent = "✕ EXIT";
        } else {
            document.exitFullscreen();
            document.getElementById('fs-btn').textContent = "⛶ FULLSCREEN";
        }
    }
</script>
</body>
</html>
